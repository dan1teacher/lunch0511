<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비룡초등학교 오늘급식</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            --text-dark: #1f2937;
            --text-light: #4b5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-dark);
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            padding: 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        p.subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: #fff;
            text-align: left;
        }

        input[type="date"] {
            padding: 14px 16px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            font-family: 'Pretendard', sans-serif;
            color: var(--text-dark);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s;
            outline: none;
        }

        input[type="date"]:focus {
            box-shadow: 0 0 0 3px rgba(255,255,255,0.5);
        }

        button {
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            background: #fff;
            color: var(--primary);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        button:active {
            transform: translateY(0);
        }

        .result-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            margin-top: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: none;
            text-align: left;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card h2 {
            font-size: 20px;
            color: var(--primary);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f3f4f6;
        }

        .menu-item {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-dark);
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
        }

        .menu-item::before {
            content: '•';
            color: var(--primary);
            font-weight: bold;
            margin-right: 8px;
        }
        
        .allergy-info {
            font-size: 12px;
            color: #9ca3af;
            margin-left: 4px;
        }

        .calorie {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px dashed #e5e7eb;
            font-size: 14px;
            color: var(--text-light);
            font-weight: 600;
            text-align: right;
        }

        .loading {
            display: none;
            margin-top: 24px;
            color: #fff;
            font-weight: 600;
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            display: none;
            background: rgba(254, 226, 226, 0.9);
            color: #991b1b;
            padding: 16px;
            border-radius: 12px;
            margin-top: 24px;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>비룡초등학교 급식 🍱</h1>
    <p class="subtitle">원하시는 날짜의 맛있는 급식 메뉴를 확인하세요!😊 </p>

    <div class="input-group">
        <label for="datePicker">조회할 날짜 선택</label>
        <input type="date" id="datePicker">
    </div>
    <button id="searchBtn">급식 조회하기</button>

    <div class="loading" id="loading">
        <div class="spinner"></div> 불러오는 중...
    </div>

    <div class="error-message" id="errorMessage"></div>

    <div class="result-card" id="resultCard">
        <h2 id="mealType">중식</h2>
        <div id="menuList"></div>
        <div class="calorie" id="calorieInfo"></div>
    </div>
</div>

<script>
    // Set default date to today
    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date();
        const dateString = today.toISOString().split('T')[0];
        document.getElementById('datePicker').value = dateString;
    });

    document.getElementById('searchBtn').addEventListener('click', fetchMealInfo);

    async function fetchMealInfo() {
        const dateInput = document.getElementById('datePicker').value;
        if (!dateInput) {
            showError("날짜를 선택해주세요.");
            return;
        }

        // Format date to YYYYMMDD
        const formattedDate = dateInput.replace(/-/g, '');
        
        // API parameters
        const ATPT_OFCDC_SC_CODE = 'J10';
        const SD_SCHUL_CODE = '7761033';
        
        const apiUrl = `https://open.neis.go.kr/hub/mealServiceDietInfo?ATPT_OFCDC_SC_CODE=${ATPT_OFCDC_SC_CODE}&SD_SCHUL_CODE=${SD_SCHUL_CODE}&MLSV_YMD=${formattedDate}`;

        showLoading();
        hideError();
        hideResult();

        try {
            const response = await fetch(apiUrl);
            if (!response.ok) {
                throw new Error('네트워크 응답이 올바르지 않습니다.');
            }
            
            const xmlText = await response.text();
            
            // Parse XML
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            
            // Check for API errors or empty data
            const head = xmlDoc.getElementsByTagName('head')[0];
            const resultCode = head ? xmlDoc.getElementsByTagName('CODE')[0].textContent : null;
            
            if (resultCode !== 'INFO-000') {
                const message = xmlDoc.getElementsByTagName('MESSAGE')[0]?.textContent || "해당 날짜의 급식 정보가 없습니다.";
                throw new Error(message);
            }
            
            // Extract Data
            const row = xmlDoc.getElementsByTagName('row')[0];
            if (!row) {
                 throw new Error("해당 날짜의 급식 정보가 없습니다.");
            }

            const mealName = row.getElementsByTagName('MMEAL_SC_NM')[0]?.textContent || '급식';
            const dishesHtml = row.getElementsByTagName('DDISH_NM')[0]?.textContent || '';
            const calorie = row.getElementsByTagName('CAL_INFO')[0]?.textContent || '';

            // Clean up dishes (remove br tags and allergy numbers)
            // NEIS formats like: 쌀밥<br/>순두부찌개(5.9.)<br/>...
            const dishes = dishesHtml.split('<br/>').filter(item => item.trim() !== '');
            
            displayResult(mealName, dishes, calorie);

        } catch (error) {
            showError(error.message);
        } finally {
            hideLoading();
        }
    }

    function displayResult(mealName, dishes, calorie) {
        document.getElementById('mealType').textContent = mealName;
        
        const menuListContainer = document.getElementById('menuList');
        menuListContainer.innerHTML = ''; // Clear previous
        
        dishes.forEach(dish => {
            // Separate allergy info to style it differently
            const match = dish.match(/(.*?)(?:\(([\d.]+)\))?$/);
            const dishName = match[1] ? match[1].trim() : dish;
            const allergy = match[2] ? `(${match[2]})` : '';

            const itemDiv = document.createElement('div');
            itemDiv.className = 'menu-item';
            
            let content = `<span>${dishName}</span>`;
            if (allergy) {
                content += `<span class="allergy-info">${allergy}</span>`;
            }
            
            itemDiv.innerHTML = content;
            menuListContainer.appendChild(itemDiv);
        });

        document.getElementById('calorieInfo').textContent = `🔥 열량: ${calorie}`;
        
        document.getElementById('resultCard').style.display = 'block';
    }

    function showLoading() {
        document.getElementById('loading').style.display = 'block';
    }

    function hideLoading() {
        document.getElementById('loading').style.display = 'none';
    }

    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
    }

    function hideError() {
        document.getElementById('errorMessage').style.display = 'none';
    }
    
    function hideResult() {
        document.getElementById('resultCard').style.display = 'none';
    }
</script>
</body>
</html>
